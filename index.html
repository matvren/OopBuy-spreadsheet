<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive / Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #ffffff; 
            color: #000000;
            -webkit-font-smoothing: antialiased;
        }

        /* Sharp edges only */
        .border-sharp { border: 1.5px solid #000000; }
        
        .product-card {
            border-bottom: 1px solid #eeeeee;
            padding-bottom: 2rem;
        }

        input, select {
            border: none;
            border-bottom: 2px solid #000000;
            border-radius: 0;
            appearance: none;
        }

        /* Image treatment to ensure they look consistent on white */
        .img-box {
            background-color: #fcfcfc;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .img-box img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <nav class="max-w-7xl mx-auto mb-20">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-8">
            <div>
                <h1 class="text-4xl font-bold tracking-tighter uppercase mb-2">Inventory.01</h1>
                <p class="text-xs font-medium opacity-50 uppercase tracking-[0.2em]">HipoBuy Manual Sync / 2026 Edition</p>
            </div>

            <div class="flex flex-wrap gap-6 w-full md:w-auto">
                <input type="text" id="searchInput" placeholder="SEARCH_DATABASE" 
                    class="bg-transparent py-2 text-sm font-bold focus:outline-none w-full md:w-64">
                
                <select id="categoryFilter" class="bg-transparent py-2 text-sm font-bold focus:outline-none cursor-pointer">
                    <option value="all">ALL_CATEGORIES</option>
                </select>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto">
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-12 gap-y-16">
            </div>

        <div id="noResults" class="hidden pt-20 border-t border-black">
            <p class="text-sm font-bold uppercase tracking-widest">Query returned zero results.</p>
        </div>
    </main>

    <script>
        let allData = [];

        async function init() {
            try {
                const r = await fetch('products.json?nocache=' + Date.now());
                allData = await r.json();
                
                // Set up Category Dropdown
                const dropdown = document.getElementById('categoryFilter');
                const categories = [...new Set(allData.map(p => p.category))].filter(c => c);
                dropdown.innerHTML = '<option value="all">FILTER / NONE</option>' + 
                    categories.map(c => `<option value="${c}">${c.toUpperCase()}</option>`).join('');
                
                render(allData);
            } catch (e) { console.error("Data Load Error", e); }
        }

        function render(data) {
            const grid = document.getElementById('productGrid');
            const empty = document.getElementById('noResults');
            
            if (data.length === 0) {
                grid.innerHTML = "";
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.innerHTML = data.map(item => `
                <div class="product-card group">
                    <a href="${item.url}" target="_blank">
                        <div class="img-box mb-6 transition-colors group-hover:bg-gray-100">
                            <img src="${item.image}" alt="${item.name}">
                        </div>
                        <div class="flex justify-between items-start gap-4">
                            <div>
                                <p class="text-[10px] font-bold opacity-40 uppercase tracking-widest mb-1">${item.category || 'General'}</p>
                                <h3 class="text-sm font-bold leading-snug uppercase tracking-tight line-clamp-2">${item.name}</h3>
                            </div>
                            <span class="text-lg font-bold tracking-tighter">${item.price}</span>
                        </div>
                        <div class="mt-6 flex items-center justify-between border-t border-black pt-4">
                            <span class="text-[10px] font-bold uppercase tracking-widest">Available</span>
                            <span class="text-[10px] font-bold uppercase underline">Source Link ↗</span>
                        </div>
                    </a>
                </div>
            `).join('');
        }

        const handleFilter = () => {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            render(allData.filter(p => 
                p.name.toLowerCase().includes(query) && (category === 'all' || p.category === category)
            ));
        };

        document.getElementById('searchInput').oninput = handleFilter;
        document.getElementById('categoryFilter').onchange = handleFilter;
        window.onload = init;
    </script>
</body>
</html>
