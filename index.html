<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HipoBuy Premium Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
        }

        .dark body {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #0f172a);
            background-size: 400% 400%;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .dark .glass {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="transition-colors duration-500">

    <nav class="glass sticky top-0 z-50 px-6 py-4 mb-8">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i class="fas fa-bolt"></i>
                </div>
                <h1 class="text-2xl font-black tracking-tighter dark:text-white uppercase">HipoBuy <span class="text-blue-500 italic">V2</span></h1>
            </div>

            <div class="flex items-center gap-3 w-full md:w-auto">
                <select id="categoryFilter" class="glass px-4 py-2 rounded-xl outline-none text-sm font-bold dark:text-white">
                    <option value="all">ALL ITEMS</option>
                </select>
                
                <div class="relative flex-grow md:w-64">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="searchInput" placeholder="Find gear..." 
                        class="w-full pl-10 pr-4 py-2 glass rounded-xl outline-none dark:text-white placeholder:text-slate-400 focus:ring-2 ring-blue-500 transition-all">
                </div>

                <button onclick="toggleTheme()" class="w-10 h-10 glass rounded-xl flex items-center justify-center dark:text-white hover:bg-blue-600 hover:text-white transition-all">
                    <i id="themeIcon" class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>

        <div id="noResults" class="hidden flex flex-col items-center justify-center py-40">
            <div class="glass p-8 rounded-full mb-6">
                <i class="fas fa-radar text-4xl text-blue-500 animate-pulse"></i>
            </div>
            <p class="text-xl font-bold text-white uppercase tracking-widest">Nothing found in orbit</p>
        </div>
    </main>

    <script>
        let allProducts = [];

        // Toggle Theme Logic
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.theme = 'dark';
            }
        }

        // Initialize Theme
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('themeIcon').classList.replace('fa-moon', 'fa-sun');
        }

        async function fetchProducts() {
            try {
                const response = await fetch('products.json?v=' + Date.now());
                allProducts = await response.json();
                updateDropdown(allProducts);
                renderProducts(allProducts);
            } catch (error) {
                console.error("Error:", error);
            }
        }

        function updateDropdown(products) {
            const dropdown = document.getElementById('categoryFilter');
            const categories = [...new Set(products.map(p => p.category))].filter(c => c);
            dropdown.innerHTML = '<option value="all">ALL ITEMS</option>' + 
                categories.map(c => `<option value="${c}">${c.toUpperCase()}</option>`).join('');
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            const noResults = document.getElementById('noResults');
            
            if (products.length === 0) {
                grid.innerHTML = "";
                noResults.classList.remove('hidden');
                return;
            }

            noResults.classList.add('hidden');
            grid.innerHTML = products.map(item => `
                <div class="product-card glass rounded-3xl overflow-hidden flex flex-col group">
                    <div class="relative aspect-square overflow-hidden">
                        <img src="${item.image}" alt="${item.name}" class="w-full h-full object-contain p-6 group-hover:scale-110 transition-transform duration-500">
                        <div class="absolute top-4 right-4">
                            <span class="bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-full shadow-lg uppercase tracking-tighter">
                                ${item.category || 'General'}
                            </span>
                        </div>
                    </div>
                    <div class="p-6 flex flex-col flex-grow bg-white/40 dark:bg-black/20">
                        <h3 class="font-bold text-slate-900 dark:text-white text-md line-clamp-2 h-12 mb-4 leading-tight">
                            ${item.name}
                        </h3>
                        <div class="mt-auto flex justify-between items-center">
                            <span class="text-2xl font-black text-blue-600 dark:text-blue-400 italic">
                                ${item.price}
                            </span>
                            <a href="${item.url}" target="_blank" class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center hover:bg-blue-400 hover:rotate-12 transition-all shadow-lg shadow-blue-500/30">
                                <i class="fas fa-arrow-right"></i>
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterItems() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryTerm = document.getElementById('categoryFilter').value;
            const filtered = allProducts.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(searchTerm);
                const matchesCategory = categoryTerm === 'all' || p.category === categoryTerm;
                return matchesSearch && matchesCategory;
            });
            renderProducts(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', filterItems);
        document.getElementById('categoryFilter').addEventListener('change', filterItems);

        window.onload = fetchProducts;
    </script>
</body>
</html>
